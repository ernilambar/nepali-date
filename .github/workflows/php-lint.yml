name: PHP Lint

on:
  push:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/php-lint.yml"
      - "**.php"
      - "phpcs.xml.dist"
      - "phpcs.tests.xml.dist"
      - "composer.json"
      - "composer.lock"
      - "build-cs/composer.json"
  pull_request:
    branches:
      - main
      - master
    paths:
      - ".github/workflows/php-lint.yml"
      - "**.php"
      - "phpcs.xml.dist"
      - "phpcs.tests.xml.dist"
      - "composer.json"
      - "composer.lock"
      - "build-cs/composer.json"
    types:
      - opened
      - reopened
      - synchronize

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/master' }}

jobs:
  phpcs:
    strategy:
      matrix:
        php-versions: [7.4]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}

      - name: Setup Composer caching
        uses: ramsey/composer-install@v2

      - name: Validate composer files
        run: composer validate

      - name: Install dependencies
        run: composer install

      - name: Run PHPCS on src
        run: composer run lint

      - name: Run PHPCS on tests
        run: composer run lint:tests
